<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cart — BricksShop</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="./css/styles.css" rel="stylesheet" />
</head>
<body>
  <header class="topbar">
    <div class="container d-flex align-items-center justify-content-between">
      <a href="./index.html" class="brand-mark">BricksShop<span class="brand-dot">.</span></a>
      <nav class="d-flex gap-3 align-items-center">
        <a href="./cart.html">Cart <span id="cart-count" class="cart-badge d-none">0</span></a>
      </nav>
    </div>
  </header>

  <main class="container py-4">
    <h1 class="h3 mb-3">Your cart</h1>
    <div id="cart-empty" class="banner banner-muted d-none">
      Your cart is empty. <a href="./index.html">Browse products</a>.
    </div>
    <div class="row g-4">
      <div class="col-12 col-md-8">
        <div id="cart-list" class="summary-card"></div>
      </div>
      <div class="col-12 col-md-4">
        <div class="summary-card">
          <h2 class="h6 text-uppercase text-secondary">Summary</h2>
          <div class="d-flex justify-content-between mt-3">
            <span>Subtotal</span><strong id="subtotal">$0.00</strong>
          </div>
          <div class="d-flex justify-content-between">
            <span>Tax (8%)</span><span id="tax">$0.00</span>
          </div>
          <div class="d-flex justify-content-between">
            <span>Shipping</span><span id="shipping">$0.00</span>
          </div>
          <hr />
          <div class="d-flex justify-content-between">
            <strong>Total</strong>
            <strong id="total">$0.00</strong>
          </div>
          <a id="checkout-btn" href="./checkout.html" class="btn btn-primary-teal w-100 mt-3">
            Proceed to checkout
          </a>
          <small class="text-secondary d-block mt-2">
            Leaving this page with items in the cart fires an <code>abandon_cart</code> event.
          </small>
        </div>
      </div>
    </div>
  </main>

  <footer>
    BricksShop · synthetic store powered by the lakehouse demo.
  </footer>

  <script src="./js/catalog.js"></script>
  <script src="./js/tracker.js"></script>
  <script src="./js/app.js"></script>
  <script>
    (function () {
      function render() {
        const cart = Tracker.getCart();
        const empty = document.getElementById("cart-empty");
        const list = document.getElementById("cart-list");
        const checkoutBtn = document.getElementById("checkout-btn");
        if (!cart || cart.items.length === 0) {
          empty.classList.remove("d-none");
          list.innerHTML = "";
          checkoutBtn.classList.add("disabled");
          document.getElementById("subtotal").textContent = "$0.00";
          document.getElementById("tax").textContent = "$0.00";
          document.getElementById("shipping").textContent = "$0.00";
          document.getElementById("total").textContent = "$0.00";
          return;
        }
        empty.classList.add("d-none");
        let subtotal = 0;
        list.innerHTML = "";
        cart.items.forEach((it) => {
          const product = window.findProduct(it.product_id) || { name: it.product_id };
          subtotal += it.price * it.qty;
          const row = document.createElement("div");
          row.className = "cart-row";
          row.innerHTML = `
            <div>
              <div class="fw-semibold">${product.name}</div>
              <small class="text-secondary">${it.product_id} · ${it.category}</small>
            </div>
            <div class="text-end">
              <div>$${(it.price * it.qty).toFixed(2)}</div>
              <small class="text-secondary">$${it.price.toFixed(2)} × ${it.qty}</small>
            </div>`;
          list.appendChild(row);
        });
        const tax = subtotal * 0.08;
        const shipping = subtotal > 75 ? 0 : 9.99;
        const total = subtotal + tax + shipping;
        document.getElementById("subtotal").textContent = "$" + subtotal.toFixed(2);
        document.getElementById("tax").textContent = "$" + tax.toFixed(2);
        document.getElementById("shipping").textContent = "$" + shipping.toFixed(2);
        document.getElementById("total").textContent = "$" + total.toFixed(2);
        checkoutBtn.classList.remove("disabled");
      }

      render();
      window.App.refreshCartBadge();
    })();
  </script>
</body>
</html>
