<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Product — Tindal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="./css/styles.css" rel="stylesheet" />
</head>
<body>
  <header class="topbar">
    <div class="container d-flex align-items-center justify-content-between">
      <a href="./index.html" class="brand-mark">tindal<span class="brand-dot">.</span></a>
      <nav class="d-flex gap-3 align-items-center">
        <a href="./cart.html">Cart <span id="cart-count" class="cart-badge d-none">0</span></a>
      </nav>
    </div>
  </header>

  <main class="container py-4">
    <a href="./index.html" class="text-decoration-none">&larr; Back to catalog</a>
    <div id="product-detail" class="mt-3"></div>
  </main>

  <footer>
    Tindal · synthetic store powered by the lakehouse demo.
  </footer>

  <script src="./js/catalog.js"></script>
  <script src="./js/tracker.js"></script>
  <script src="./js/app.js"></script>
  <script>
    (function () {
      const params = new URLSearchParams(location.search);
      const id = params.get("id");
      const product = window.findProduct(id);
      const detail = document.getElementById("product-detail");

      if (!product) {
        detail.innerHTML = `<div class="banner banner-muted">Product not found.</div>`;
        return;
      }

      const emoji = product.category === "electronics" ? "📱"
                  : product.category === "appliances"  ? "🍳"
                  : product.category === "furniture"   ? "🛋️" : "📦";

      detail.innerHTML = `
        <div class="row g-4 align-items-stretch">
          <div class="col-12 col-md-5">
            <div class="product-thumb" style="height: 320px; border-radius: 14px; font-size: 5rem;">${emoji}</div>
          </div>
          <div class="col-12 col-md-7 d-flex flex-column">
            <div class="product-cat">${product.category}</div>
            <h1 class="h3">${product.name}</h1>
            <p class="text-secondary">${product.blurb}</p>
            <div class="product-price mb-3" style="font-size: 1.5rem;">$${product.price.toFixed(2)}</div>

            <div class="d-flex align-items-center gap-2 mb-3">
              <label for="qty" class="me-2">Quantity</label>
              <input id="qty" type="number" min="1" max="9" value="1"
                     class="form-control" style="width: 90px;" />
            </div>

            <div class="d-flex gap-2">
              <button id="add-btn" class="btn btn-primary-teal px-4">Add to cart</button>
              <a href="./cart.html" class="btn btn-outline-teal">View cart</a>
            </div>
            <small class="text-secondary mt-3">
              Adding to cart fires an <code>add_to_cart</code> event tagged with
              <code>cart_id</code>, <code>product_id</code>, <code>price</code>, and <code>quantity</code>.
            </small>
          </div>
        </div>`;

      document.getElementById("add-btn").addEventListener("click", () => {
        const qty = document.getElementById("qty").value;
        Tracker.addToCart(product, qty);
        window.App.refreshCartBadge();
        document.getElementById("add-btn").textContent = "Added ✓";
        setTimeout(() => (document.getElementById("add-btn").textContent = "Add to cart"), 1200);
      });

      window.App.refreshCartBadge();
    })();
  </script>
</body>
</html>
